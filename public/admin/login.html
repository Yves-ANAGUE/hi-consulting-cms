<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Connexion Back-Office | HI CONSULTING IMMIGRATION</title>
  <link rel="icon" href="/static/images/logo_HICI.jpg">
  <link rel="stylesheet" href="/admin/css/admin.css">
</head>
<body class="page-connexion">
  <div class="carte-connexion">
    <img src="/static/images/logo_HICI.jpg" alt="HI CONSULTING IMMIGRATION" width="56" height="56">
    <h1>Espace Administration</h1>
    <p class="texte-secondaire">HI CONSULTING IMMIGRATION</p>
    <form id="formulaireConnexion">
      <input type="email" name="email" placeholder="Adresse email" required autofocus>
      <input type="password" name="motDePasse" placeholder="Mot de passe" required>
      <button type="submit" class="bouton bouton-primaire">Se connecter</button>
      <p id="messageErreurConnexion" class="message-erreur" role="alert"></p>
    </form>
  </div>
  <script src="/admin/js/admin.js"></script>
</body>
</html>

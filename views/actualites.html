<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  {{balisesMeta}}
  <link rel="icon" href="/static/images/logo_HICI.jpg">
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  {{> _entete.html}}

  <main>
    <section class="entete-page conteneur section-avec-formes">
      <div class="forme-decorative forme-trapeze" style="width:190px;height:150px;background:var(--degrade-chaud);top:-20px;left:4%;opacity:0.15;"></div>
      <h1 data-cle-i18n="actualites_titre_page">Actualités Migratoires</h1>
      <p data-cle-i18n="actualites_sous_titre">Les dernières lois et tendances en immigration, mises à jour en temps réel.</p>
      <button id="boutonSyntheseIa" class="bouton bouton-secondaire" type="button">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2l2.5 6.5L21 11l-6.5 2.5L12 20l-2.5-6.5L3 11l6.5-2.5z"/></svg>
        <span data-cle-i18n="actualites_bouton_synthese">Synthèse IA globale</span>
      </button>
      <div id="conteneurSyntheseIa" class="conteneur-synthese-ia" hidden></div>
    </section>

    <!-- Squelettes de taille fixe pour éviter tout Cumulative Layout Shift -->
    <section class="conteneur section-sans-haut">
      <div id="grilleActualitesComplete" class="grille-cartes">
        <div class="squelette-carte squelette-actualite"></div>
        <div class="squelette-carte squelette-actualite"></div>
        <div class="squelette-carte squelette-actualite"></div>
        <div class="squelette-carte squelette-actualite"></div>
        <div class="squelette-carte squelette-actualite"></div>
        <div class="squelette-carte squelette-actualite"></div>
      </div>
    </section>
  </main>

  {{> _pied.html}}
  <script src="/static/js/actualites.js"></script>
</body>
</html>
